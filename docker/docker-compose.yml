services:
  postgres:
    image: postgres:16
    container_name: mediation_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediation}
      POSTGRES_DB: ${POSTGRES_DB:-mediation_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediation}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
